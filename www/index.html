<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>JARVIS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #0a0e1a;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  /* ── SPLASH ── */
  #splash {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 40%, #0d1f3c 0%, #0a0e1a 70%);
    z-index: 100;
    transition: opacity .5s ease, transform .5s ease;
  }

  #splash.hide {
    opacity: 0;
    transform: scale(1.05);
    pointer-events: none;
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(0, 212, 255, 0.15);
  }
  .ring.r1 { width: 340px; height: 340px; animation: spin 12s linear infinite; }
  .ring.r2 { width: 460px; height: 460px; animation: spin 20s linear infinite reverse; }
  .ring.r3 { width: 580px; height: 580px; border-color: rgba(0,212,255,.07); animation: spin 30s linear infinite; }

  .ring-dot {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #00d4ff;
    top: -3px; left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 8px #00d4ff;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .logo-wrap {
    position: relative;
    animation: popIn .7s cubic-bezier(.175,.885,.32,1.275) both;
    animation-delay: .3s;
    z-index: 10;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(.4); }
    to   { opacity: 1; transform: scale(1); }
  }

  .logo-glow {
    position: absolute; inset: -24px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,212,255,.3) 0%, transparent 70%);
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: .6; }
    50%       { transform: scale(1.2); opacity: 1; }
  }

  .logo-img {
    width: 110px; height: 110px;
    border-radius: 50%;
    display: block;
    position: relative;
    border: 2px solid rgba(0,212,255,.4);
    box-shadow: 0 0 30px rgba(0,212,255,.4), 0 0 60px rgba(0,212,255,.15);
  }

  .app-name {
    color: #fff;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 8px;
    margin-top: 28px;
    text-transform: uppercase;
    animation: fadeUp .6s ease both;
    animation-delay: .6s;
    text-shadow: 0 0 20px rgba(0,212,255,.5);
  }

  .app-tagline {
    color: rgba(0,212,255,.6);
    font-size: 11px;
    font-weight: 400;
    margin-top: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
    animation: fadeUp .6s ease both;
    animation-delay: .75s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .progress-wrap {
    width: 180px;
    height: 2px;
    background: rgba(0,212,255,.1);
    border-radius: 10px;
    margin-top: 52px;
    overflow: hidden;
    animation: fadeUp .6s ease both;
    animation-delay: .9s;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #00d4ff, #7b61ff);
    border-radius: 10px;
    width: 0%;
    animation: loading 2.5s ease forwards;
    animation-delay: 1s;
    box-shadow: 0 0 8px #00d4ff;
  }

  @keyframes loading {
    0%   { width: 0%; }
    30%  { width: 45%; }
    65%  { width: 78%; }
    100% { width: 100%; }
  }

  .status-text {
    color: rgba(0,212,255,.4);
    font-size: 10px;
    letter-spacing: 2px;
    margin-top: 16px;
    animation: fadeUp .6s ease both, blink 1.2s step-end infinite;
    animation-delay: 1s, 1.5s;
  }

  @keyframes blink {
    0%, 100% { opacity: .4; }
    50%       { opacity: .1; }
  }

  .app-version {
    position: absolute;
    bottom: 36px;
    color: rgba(255,255,255,.15);
    font-size: 10px;
    letter-spacing: 1px;
    animation: fadeUp .6s ease both;
    animation-delay: 1.1s;
  }

  /* ── BOTÃO ATUALIZAR ── */
  #btn-refresh {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 9999;
    width: 42px; height: 42px;
    border-radius: 50%;
    background: rgba(0,212,255,0.12);
    border: 1px solid rgba(0,212,255,0.3);
    color: #00d4ff;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: background .2s, transform .15s;
    opacity: 0;
    animation: fadeIn 1s ease 4s forwards;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  #btn-refresh:active {
    transform: scale(.9) rotate(180deg);
    background: rgba(0,212,255,0.25);
  }

  #btn-refresh.spinning svg {
    animation: spinIcon .6s linear;
  }

  @keyframes spinIcon {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* ── OFFLINE ── */
  #offline {
    display: none;
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 40%, #0d1f3c 0%, #0a0e1a 70%);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-align: center;
    padding: 40px;
  }

  #offline.show { display: flex; }

  .offline-icon { font-size: 56px; margin-bottom: 20px; filter: grayscale(1) opacity(.6); }

  .offline-title {
    font-size: 20px; font-weight: 700; margin-bottom: 10px;
    letter-spacing: 2px; text-transform: uppercase;
    color: rgba(0,212,255,.8);
  }

  .offline-sub {
    font-size: 13px; color: rgba(255,255,255,.4); line-height: 1.7; margin-bottom: 36px;
  }

  .btn-retry {
    background: linear-gradient(135deg, #00d4ff, #7b61ff);
    color: #fff; border: none;
    padding: 14px 40px; border-radius: 50px;
    font-size: 14px; font-weight: 700;
    cursor: pointer; letter-spacing: 2px; text-transform: uppercase;
    box-shadow: 0 4px 24px rgba(0,212,255,.3);
    transition: transform .15s;
  }

  .btn-retry:active { transform: scale(.95); }
</style>
</head>
<body>

<!-- BOTÃO FORÇAR ATUALIZAÇÃO -->
<button id="btn-refresh" onclick="forceRefresh()" title="Forçar atualização">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="23 4 23 10 17 10"></polyline>
    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
  </svg>
</button>

<!-- SPLASH SCREEN -->
<div id="splash">
  <div class="ring r1"><div class="ring-dot"></div></div>
  <div class="ring r2"><div class="ring-dot"></div></div>
  <div class="ring r3"></div>

  <div class="logo-wrap">
    <div class="logo-glow"></div>
    <img class="logo-img" src="logo.png" alt="JARVIS"/>
  </div>

  <div class="app-name">JARVIS</div>
  <div class="app-tagline">Just A Rather Very Intelligent System</div>

  <div class="progress-wrap">
    <div class="progress-bar"></div>
  </div>
  <div class="status-text">INICIALIZANDO SISTEMAS...</div>

  <div class="app-version">v1.0.1 · amzbyte.shop</div>
</div>

<!-- OFFLINE -->
<div id="offline">
  <div class="offline-icon">📡</div>
  <div class="offline-title">Sem conexão</div>
  <div class="offline-sub">JARVIS precisa de internet<br/>para operar. Verifique sua rede.</div>
  <button class="btn-retry" onclick="retry()">Reconectar</button>
</div>

<script>
  const splash  = document.getElementById('splash');
  const offline = document.getElementById('offline');
  const btnRefresh = document.getElementById('btn-refresh');
  const SITE = 'https://jarvis.amzbyte.shop';

  function forceRefresh() {
    const btn = document.getElementById('btn-refresh');
    btn.classList.add('spinning');
    // Limpa cache e recarrega com timestamp para burlar service worker e CDN
    const url = SITE + '?v=' + Date.now();
    setTimeout(() => {
      if ('caches' in window) {
        caches.keys().then(names => names.forEach(n => caches.delete(n)));
      }
      window.location.href = url;
    }, 400);
  }

  function goToSite() {
    splash.classList.add('hide');
    setTimeout(() => { window.location.href = SITE; }, 500);
  }

  function showOffline() {
    splash.classList.add('hide');
    offline.classList.add('show');
  }

  function retry() {
    offline.classList.remove('show');
    splash.classList.remove('hide');
    setTimeout(checkLoad, 300);
  }

  function checkLoad() {
    if (!navigator.onLine) { showOffline(); return; }
    setTimeout(goToSite, 3200);
  }

  window.addEventListener('offline', showOffline);
  checkLoad();
</script>
</body>
</html>
