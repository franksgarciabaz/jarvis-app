name: Build APK - JARVIS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate JARVIS icons and splash
        run: node generate-assets.mjs

      - name: Fix app name in strings.xml
        run: |
          sed -i 's|<string name="app_name">.*</string>|<string name="app_name">JARVIS</string>|g' android/app/src/main/res/values/strings.xml
          sed -i 's|<string name="title_activity_main">.*</string>|<string name="title_activity_main">JARVIS</string>|g' android/app/src/main/res/values/strings.xml

      - name: Create assets directory
        run: mkdir -p android/app/src/main/assets

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Restore app name after cap sync
        run: |
          sed -i 's|<string name="app_name">.*</string>|<string name="app_name">JARVIS</string>|g' android/app/src/main/res/values/strings.xml
          sed -i 's|<string name="title_activity_main">.*</string>|<string name="title_activity_main">JARVIS</string>|g' android/app/src/main/res/values/strings.xml

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 90

      - name: Publish GitHub Release
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v1.0.${{ github.run_number }}"
          cp android/app/build/outputs/apk/debug/app-debug.apk "JARVIS-${VERSION}.apk"
          gh release create "${VERSION}" "JARVIS-${VERSION}.apk" --title "JARVIS ${VERSION}" --notes "Build automatico numero ${{ github.run_number }}"
